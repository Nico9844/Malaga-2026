<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Málaga 2026</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to top,#ffb88c,#de6262);
}

/* Wellen */
.wave{
    position:absolute;
    bottom:0;
    left:0;
    width:200%;
    height:200px;
    background:rgba(255,255,255,0.25);
    border-radius:40%;
    animation:wave 10s linear infinite;
}

.wave:nth-child(2){
    bottom:-40px;
    opacity:0.4;
    animation-duration:14s;
}

.wave:nth-child(3){
    bottom:-80px;
    opacity:0.2;
    animation-duration:18s;
}

@keyframes wave{
    0%{transform:translateX(0);}
    50%{transform:translateX(-25%);}
    100%{transform:translateX(-50%);}
}

/* Karte */
.card{
    position:relative;
    z-index:10;
    width:380px;
    max-width:90%;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.92);
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    backdrop-filter:blur(8px);
    text-align:center;
}

h1{
    color:#c0392b;
    margin-bottom:8px;
}

.subtitle{
    color:#7a5c58;
    font-style:italic;
    margin-bottom:20px;
}

input{
    width:80%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    text-align:center;
    font-size:16px;
}

button{
    margin-top:12px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#c0392b;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#922b21;
}

/* Brief */
.message{
    display:none;
    margin-top:25px;
    text-align:left;
    color:#3b2f2f;
    line-height:1.7;
}

.message h2{
    text-align:center;
    color:#c0392b;
}

.typewriter{
    white-space:pre-wrap;
    border-right:2px solid #c0392b;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#8b6b61;
    font-size:12px;
}
</style>
</head>

<body>

<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<div class="card">

    <h1>Málaga 2026</h1>
    <p class="subtitle">Melissa & Nico</p>

    <input
        type="password"
        id="pw"
        placeholder="Passwort eingeben">

    <br>

    <button onclick="checkPassword()">
        Öffnen
    </button>

    <div class="message" id="message">

        <h2>❤️ Liebe Melissa ❤️</h2>

        <div id="typewriter" class="typewriter"></div>

        <div class="footer">
            ☀️ Málaga · Spanien · 2026 ☀️
        </div>

    </div>

</div>

<script>

let started = false;

function checkPassword(){

    const password =
        document.getElementById("pw").value.trim();

    if(password.toLowerCase() === "kleiner stern"){

        document.getElementById("message")
            .style.display = "block";

        if(!started){
            started = true;
            startTypewriter();
        }

    }else{

        alert("Falsches Passwort ❤️");

    }
}

function startTypewriter(){

    const text = `Zwischen den warmen Straßen von Málaga,

dem goldenen Licht auf dem Meer
und den ruhigen Abenden am Hafen
habe ich oft an dich gedacht.

Dieser Ort war wunderschön –
aber ohne dich wäre er nur ein Ort geblieben.

Mit dir wurde er Erinnerung.
Und Erinnerung wurde Gefühl.

Du bist mein Lieblingsort,
egal wo ich gerade bin.

Danke für all die Momente,
über die wir noch in vielen Jahren
gemeinsam lachen werden.

Ich liebe dich. ❤️`;

    let i = 0;

    const speed = 35;

    const target =
        document.getElementById("typewriter");

    function write(){

        if(i < text.length){

            target.innerHTML += text.charAt(i);

            i++;

            setTimeout(write, speed);
        }
    }

    write();
}
</script>

</body>
</html>
